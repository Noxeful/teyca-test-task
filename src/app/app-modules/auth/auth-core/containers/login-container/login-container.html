<div class="login-container">

  <div class="login-container__form">
    <login-form (submitFormEvent)="onSubmit($event)"></login-form>
  </div>

  <div class="login-container__ads-block">

    <div class="ads-header-block">
      <div class="first-word">
        Программа
      </div>
      <div class="second-word">
        лояльности
      </div>
    </div>

    <div class="ads-footer-block">

      <div class="ads-promotion-block">
          @for (item of promotionItems; track $index) {
            <promotion-block-item [iconName]="item.iconName" [text]="item.text"></promotion-block-item>
          }
      </div>

      <div class="ads-arrows-block">
        <button mat-icon-button class="custom-nav-button" aria-label="Previous" disabled>
          <mat-icon svgIcon="chevronLeft"></mat-icon>
        </button>

        <button mat-icon-button class="custom-nav-button" aria-label="Next">
          <mat-icon svgIcon="chevronRight"></mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>

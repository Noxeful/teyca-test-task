<div class="users-container">

  <div class="users-top-bar">

  </div>

  <nav
    mat-tab-nav-bar
    class="users-navigation"
    [mat-stretch-tabs]="false"
    [tabPanel]="tabPanel"
  >
    @for (link of links; track $index) {
      <a
        mat-tab-link
        routerLinkActive
        #rla="routerLinkActive"
        [active]="rla.isActive"
        [routerLink]="link.path"
      >
          <span class="tab-label-badge">
            {{ link.label }}
          </span>
      </a>
    }
  </nav>

  <mat-tab-nav-panel class="users-navigation-content" #tabPanel>
    <router-outlet></router-outlet>
  </mat-tab-nav-panel>
</div>
